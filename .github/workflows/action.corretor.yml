name: spell check

on:
  pull_request:
    branches: [master]

jobs:
  spellcheck:
    runs-on: ubuntu-22.04

    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - run: npm install

      - name: run cspell
        uses: streetsidesoftware/cspell-action@v8
        with:
          config: './_meta/cspell.json'
          files: '**/*.md'

      - name: comment if failed
        if: failure()
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            Foram encontrados erros ortográficos em seu pull-request.
